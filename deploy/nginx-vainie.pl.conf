# vainie.pl — public (certbot will add the SSL block automatically)
server {
    listen 80;
    listen [::]:80;
    server_name vainie.pl www.vainie.pl;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers (keep in sync with src/middleware.ts)
    # note: Next's middleware also sets these; nginx "always" overrides, so
    # make sure the values here match.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:6967;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ------------------------------------------------------------
# Optional: local hostname inside your LAN (http://vainie.lan)
# Requires a DNS entry or /etc/hosts line pointing vainie.lan
# at your server's LAN IP.
# Uncomment to enable.
